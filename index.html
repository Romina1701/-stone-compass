<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0d2a">
<title>Stone Compass｜天然石診断</title>
<style>
:root{
  --bg:#0a0d2a;--panel:#19122f;--text:#fff;--muted:#c7bfd4;
  --gold:#efd58b;--line:rgba(255,255,255,.14);--pink:#ffb6d3;--violet:#c5a6ff
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;min-height:100vh;color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  background:
    radial-gradient(circle at 14% 8%,rgba(116,72,225,.25),transparent 25%),
    radial-gradient(circle at 87% 10%,rgba(43,108,220,.20),transparent 22%),
    linear-gradient(180deg,#080b22,#141032 55%,#080b22)
}
body:before{
  content:"";position:fixed;inset:0;pointer-events:none;opacity:.5;
  background-image:radial-gradient(circle,#fff 0 1px,transparent 1.3px);
  background-size:75px 75px
}
button,input{font:inherit}
.hidden{display:none!important}
.wrap{width:min(780px,calc(100% - 24px));margin:auto}
.hero{min-height:100svh;display:grid;place-items:center;padding:28px 0}
.hero-card{
  width:100%;padding:40px 24px;text-align:center;border-radius:30px;
  border:1px solid var(--line);background:rgba(14,10,32,.76);
  backdrop-filter:blur(18px);box-shadow:0 28px 80px rgba(0,0,0,.38)
}
.logo{font-family:Georgia,"Yu Mincho",serif;color:#fff1c3;font-size:clamp(2.1rem,8vw,4.2rem)}
.logo small{display:block;font:500 .28em/1.5 sans-serif;letter-spacing:.34em;color:#d9c793}
.hero h1{font-family:"Yu Mincho",serif;font-size:clamp(1.8rem,5vw,3rem);margin:25px 0 12px}
.hero p{color:var(--muted);line-height:1.9}
.btn{
  min-height:52px;padding:0 22px;border-radius:999px;border:0;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;font-weight:800
}
.primary{background:linear-gradient(135deg,#efd68f,#d5b6ff,#ffb7d5);color:#21162c}
.secondary{background:rgba(255,255,255,.07);border:1px solid var(--line);color:#fff}
.quiz{padding:24px 0 60px}
.quiz-card{padding:24px;border-radius:26px;background:rgba(24,17,45,.95);border:1px solid var(--line);box-shadow:0 24px 70px rgba(0,0,0,.32)}
.progress{height:8px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:22px}
.bar{height:100%;width:10%;background:linear-gradient(90deg,var(--gold),var(--pink),var(--violet));transition:.25s}
.quiz h2{font-family:"Yu Mincho",serif;font-size:clamp(1.5rem,5vw,2.2rem);margin:0 0 14px}
.quiz p{color:var(--muted);line-height:1.75}
.date{width:100%;min-height:56px;padding:0 15px;border-radius:15px;border:1px solid var(--line);background:rgba(255,255,255,.07);color:#fff;color-scheme:dark}
.answers{display:grid;gap:11px;margin:20px 0}
.answer{padding:16px;text-align:left;border-radius:15px;border:1px solid var(--line);background:rgba(255,255,255,.055);color:#fff;cursor:pointer}
.answer.selected{border-color:var(--gold);background:rgba(239,213,139,.13)}
.actions{display:flex;justify-content:space-between;gap:10px;margin-top:22px}
.error{color:#ff9db4;min-height:24px}
.result{padding:10px 0 50px}
.result-top{position:sticky;top:0;z-index:5;padding:12px 0;background:rgba(9,11,34,.88);backdrop-filter:blur(16px)}
.result-top-inner{display:flex;align-items:center;justify-content:space-between;gap:12px}
.result-title{font-family:"Yu Mincho",serif;font-size:1.15rem}
.result-image{
  display:block;width:100%;height:auto;margin:12px auto 0;border-radius:18px;
  box-shadow:0 24px 65px rgba(0,0,0,.42);background:#fff
}
.result-info{margin-top:14px;padding:17px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.07)}
.result-info small{color:var(--gold);letter-spacing:.08em}
.result-info h2{font-family:"Yu Mincho",serif;margin:5px 0 8px}
.result-info p{color:var(--muted);line-height:1.7;margin:0}
.result-buttons{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px}
.result-buttons .btn{width:100%}
.note{font-size:.76rem;color:#9f96ad;line-height:1.7;margin-top:16px}
@media(max-width:520px){
  .wrap{width:min(100% - 16px,780px)}
  .hero-card,.quiz-card{padding:26px 17px}
  .result-buttons{grid-template-columns:1fr}
  .result-image{border-radius:10px}
  .result-top .btn{min-height:40px;padding:0 14px;font-size:.78rem}
}
</style>
</head>
<body>

<section class="hero" id="hero">
  <div class="wrap">
    <div class="hero-card">
      <div class="logo">✧ Stone Compass<small>ストーンコンパス</small></div>
      <h1>あなたを導く石を見つける</h1>
      <p>誕生日と5つの質問から、今のテーマに寄り添う天然石とブレスレットをご提案します。</p>
      <button class="btn primary" id="startBtn">無料で診断を始める</button>
    </div>
  </div>
</section>

<section class="quiz hidden" id="quiz">
  <div class="wrap">
    <div class="quiz-card">
      <div class="progress"><div class="bar" id="bar"></div></div>

      <div id="birthScreen">
        <h2>生年月日を入力してください</h2>
        <p>生年月日の数字から、ライフパスナンバーを計算します。</p>
        <input class="date" type="date" id="birthday">
        <div class="error" id="birthError"></div>
        <div class="actions"><span></span><button class="btn primary" id="birthNext">質問へ進む →</button></div>
      </div>

      <div id="questionScreen" class="hidden">
        <small id="questionCount"></small>
        <h2 id="questionText"></h2>
        <p>いちばん近いものを選んでください。</p>
        <div class="answers" id="answers"></div>
        <div class="actions">
          <button class="btn secondary" id="prevBtn">← 戻る</button>
          <button class="btn primary" id="nextBtn">次へ →</button>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="result hidden" id="result">
  <div class="result-top">
    <div class="wrap result-top-inner">
      <div class="result-title">✧ Stone Compass 診断結果</div>
      <button class="btn secondary" id="restartTop">↻ やり直す</button>
    </div>
  </div>
  <div class="wrap">
    <img class="result-image" id="resultImage" alt="Stone Compass 診断結果">
    <div class="result-info">
      <small id="resultCode"></small>
      <h2 id="resultName"></h2>
      <p id="resultStones"></p>
    </div>
    <div class="result-buttons">
      <button class="btn primary" id="orderBtn">この結果でオーダー相談へ →</button>
      <button class="btn secondary" id="restartBtn">もう一度診断する</button>
    </div>
    <p class="note">画像内のボタンはデザインです。実際に操作できるボタンは画像の下にあります。天然石の意味合いは伝承に基づくもので、医学的な効果を保証するものではありません。</p>
  </div>
</section>

<script>
const questions=[
 {q:"最近、いちばん気になっていることは？",a:[
  ["人との関係を穏やかにしたい","love"],
  ["仕事や目標を前へ進めたい","work"],
  ["疲れや心のざわつきを整えたい","healing"],
  ["迷いを整理し、自分の本音を知りたい","intuition"],
  ["環境や流れを変えたい","growth"]
 ]},
 {q:"今、最も手に入れたい感覚は？",a:[
  ["安心と愛情","love"],["達成感と自信","work"],["静けさと休息","healing"],
  ["確信と洞察","intuition"],["自由と新鮮さ","growth"]
 ]},
 {q:"困った時に出やすい傾向は？",a:[
  ["周囲に合わせすぎる","love"],["抱え込んで頑張りすぎる","work"],["考え続けて疲れる","healing"],
  ["答えを探しすぎて動けない","intuition"],["すべてを一度に変えたくなる","growth"]
 ]},
 {q:"次の一週間で大切にしたいことは？",a:[
  ["気持ちを言葉にする","love"],["優先順位を一つ決める","work"],["休む時間を守る","healing"],
  ["静かに自分と向き合う","intuition"],["小さく新しいことを試す","growth"]
 ]},
 {q:"今の自分に贈りたい言葉は？",a:[
  ["自分にもやさしくていい","love"],["一歩ずつ進めばいい","work"],["休むことも前進","healing"],
  ["自分の直感を信じて","intuition"],["変化を楽しもう","growth"]
 ]}
];

const resultData={
 love:{
  name:"愛と調和",
  stones:"ローズクォーツ・アメジスト・水晶",
  image:"result-love-harmony-01.png"
 },
 work:{
  name:"仕事・成功",
  stones:"シトリン・カーネリアン・タイガーアイ",
  image:"result-work-success-01.png"
 },
 healing:{
  name:"癒やし・再生",
  stones:"アクアマリン・ムーンストーン・水晶",
  image:"result-healing-01.png"
 },
 intuition:{
  name:"直感・真実",
  stones:"ラピスラズリ・アメジスト・水晶",
  image:"result-intuition-01.png"
 },
 growth:{
  name:"成長・変化",
  stones:"ラブラドライト・ターコイズ・水晶",
  image:"result-growth-01.png"
 }
};

const hero=document.getElementById("hero");
const quiz=document.getElementById("quiz");
const result=document.getElementById("result");
const birthScreen=document.getElementById("birthScreen");
const questionScreen=document.getElementById("questionScreen");
const bar=document.getElementById("bar");
const birthday=document.getElementById("birthday");
let current=0;
let selectedAnswers=new Array(questions.length).fill(null);
let selectedResultKey="love";

document.getElementById("startBtn").onclick=()=>{
 hero.classList.add("hidden"); quiz.classList.remove("hidden");
 window.scrollTo(0,0); bar.style.width="10%";
};

document.getElementById("birthNext").onclick=()=>{
 const err=document.getElementById("birthError");
 if(!birthday.value){err.textContent="生年月日を入力してください。";return;}
 if(new Date(birthday.value+"T00:00:00")>new Date()){err.textContent="未来の日付は選べません。";return;}
 err.textContent="";
 birthScreen.classList.add("hidden");questionScreen.classList.remove("hidden");
 current=0;renderQuestion();
};

function renderQuestion(){
 const q=questions[current];
 document.getElementById("questionCount").textContent=`QUESTION ${current+1} / ${questions.length}`;
 document.getElementById("questionText").textContent=q.q;
 const answers=document.getElementById("answers"); answers.innerHTML="";
 q.a.forEach(([label,key])=>{
  const b=document.createElement("button");
  b.className="answer"+(selectedAnswers[current]===key?" selected":"");
  b.textContent=label;
  b.onclick=()=>{selectedAnswers[current]=key;renderQuestion();};
  answers.appendChild(b);
 });
 document.getElementById("nextBtn").textContent=current===questions.length-1?"診断結果を見る ✦":"次へ →";
 bar.style.width=(25+(current+1)*14)+"%";
}

document.getElementById("prevBtn").onclick=()=>{
 if(current===0){questionScreen.classList.add("hidden");birthScreen.classList.remove("hidden");bar.style.width="10%";}
 else{current--;renderQuestion();}
};

document.getElementById("nextBtn").onclick=()=>{
 if(!selectedAnswers[current])return;
 if(current<questions.length-1){current++;renderQuestion();}
 else showResult();
};

function calculateLifePath(dateString){
 let sum=[...dateString.replaceAll("-","")].reduce((a,n)=>a+Number(n),0);
 while(sum>9 && ![11,22,33].includes(sum)){
  sum=[...String(sum)].reduce((a,n)=>a+Number(n),0);
 }
 return sum;
}

function chooseResult(){
 const counts={love:0,work:0,healing:0,intuition:0,growth:0};
 selectedAnswers.forEach(k=>counts[k]++);
 const max=Math.max(...Object.values(counts));
 let tied=Object.keys(counts).filter(k=>counts[k]===max);
 if(tied.length===1)return tied[0];
 const life=calculateLifePath(birthday.value);
 return tied[life%tied.length];
}

function showResult(){
 selectedResultKey=chooseResult();
 const data=resultData[selectedResultKey];
 quiz.classList.add("hidden");result.classList.remove("hidden");
 document.getElementById("resultImage").src=data.image;
 document.getElementById("resultImage").alt=`${data.name}のStone Compass診断結果`;
 document.getElementById("resultCode").textContent=`RESULT：${selectedResultKey.toUpperCase()}`;
 document.getElementById("resultName").textContent=data.name;
 document.getElementById("resultStones").textContent=`おすすめ天然石：${data.stones}`;
 window.scrollTo(0,0);
}

function restart(){
 location.reload();
}
document.getElementById("restartBtn").onclick=restart;
document.getElementById("restartTop").onclick=restart;

document.getElementById("orderBtn").onclick=()=>{
 const data=resultData[selectedResultKey];
 const text=`Stone Compass 診断結果\nテーマ：${data.name}\nおすすめ天然石：${data.stones}`;
 if(navigator.share){
  navigator.share({title:"Stone Compass 診断結果",text}).catch(()=>{});
 }else{
  alert("オーダー相談ページの接続前です。\n\n"+text);
 }
};
</script>
</body>
</html>
